<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AquaSense — Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../img/log.png">
</head>
<body>
<div class="login-page">
  <div class="login-bg-shapes"></div>
  <div class="login-card fade-in">

    <div class="login-logo">
      <div class="login-logo-icon" style="background:none;padding:0;"><img src="../img/log.png" style="width:52px;height:52px;border-radius:14px;" alt="logo"></div>
      <div>
        <div class="login-logo-text">AquaSense</div>
        <div class="login-logo-sub">IoT Monitoring v1.0</div>
      </div>
    </div>

    <div class="login-title">Bienvenido</div>
    <div class="login-sub">Ingresa tu nombre y contraseña para continuar.</div>

    <div class="form-group">
      <label class="form-label" for="correo">Correo electrónico</label>
      <input class="form-input" type="email" id="correo" placeholder="correo@ejemplo.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label" for="contrasena">Contraseña</label>
      <div style="position:relative;">
        <input class="form-input" type="password" id="contrasena" placeholder="••••••••" style="padding-right:44px;">
        <span onclick="togglePassword()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1rem;color:var(--text3);">👁</span>
      </div>
    </div>

    <button class="login-btn" onclick="iniciarSesion()" id="btn-login">Iniciar Sesión</button>
    <div class="login-error" id="login-error">❌ Nombre o contraseña incorrectos</div>

    <div style="text-align:center;margin-top:16px;font-size:0.82rem;color:var(--text2);">
      ¿No tienes cuenta? <a href="registro.html" style="color:var(--accent2);font-weight:600;text-decoration:none;">Regístrate aquí</a>
    </div>
    <div class="login-footer">
      <span class="eco-badge">🌿 Eco-Friendly</span>
      <span>·</span>
      <span>Granja La Aleta del Tiburón · Barranquilla</span>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  function togglePassword() { const i=document.getElementById('contrasena'); i.type=i.type==='password'?'text':'password'; }
  document.addEventListener('keydown', e => { if(e.key==='Enter') iniciarSesion(); });

  async function iniciarSesion() {
    const correo=document.getElementById('correo').value.trim();
    const contrasena=document.getElementById('contrasena').value;
    const btn=document.getElementById('btn-login');
    const errEl=document.getElementById('login-error');
    if(!correo||!contrasena){ errEl.textContent='⚠️ Completa todos los campos'; errEl.classList.add('show'); return; }
    btn.textContent='Verificando...'; btn.disabled=true; errEl.classList.remove('show');
    try {
      const res=await axios.post(`${CONFIG.API_BASE_URL}/login`,{correo,contrasena});
      if(res.data.ok){
        localStorage.setItem('aq_usuario',JSON.stringify(res.data.usuario));
        btn.textContent='✅ Acceso concedido';
        setTimeout(()=>{ window.location.href='index.html'; },600);
      } else {
        errEl.textContent='❌ Nombre o contraseña incorrectos';
        errEl.classList.add('show'); btn.textContent='Iniciar Sesión'; btn.disabled=false;
      }
    } catch(e) {
      errEl.textContent='🔌 No se pudo conectar con el servidor';
      errEl.classList.add('show'); btn.textContent='Iniciar Sesión'; btn.disabled=false;
    }
  }

  window.addEventListener('DOMContentLoaded',()=>{
    if(localStorage.getItem('aq_usuario')) window.location.href='index.html';
  });
</script>
</body>
</html>
